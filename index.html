<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cosmic Beats</title><link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Inter:wght@400;600&display=swap" rel="stylesheet"><style>

body{
margin:0;
background:#070714;
color:white;
font-family:Inter;
}

header{
text-align:center;
padding:18px;
font-family:Orbitron;
background:linear-gradient(135deg,#7c3aed,#06b6d4);
}

.banner{
text-align:center;
padding:8px;
background:#111;
font-size:14px;
}

.page{
display:none;
padding:15px;
}

.page.active{
display:block;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.card{
background:#151528;
padding:12px;
border-radius:10px;
cursor:pointer;
text-align:center;
}

.card:hover{
background:#7c3aed;
}

.artist img{
width:100%;
border-radius:8px;
margin-bottom:6px;
}

.song{
background:#121226;
padding:10px;
border-radius:8px;
margin-bottom:8px;
cursor:pointer;
}

.song:hover{
background:#1f1f3a;
}

input{
width:100%;
padding:10px;
border-radius:8px;
border:none;
margin-bottom:10px;
}

button{
padding:12px;
border:none;
border-radius:8px;
background:#7c3aed;
color:white;
width:100%;
margin-top:8px;
}

.player{
position:fixed;
bottom:60px;
left:0;
right:0;
background:#111125;
padding:10px;
display:flex;
justify-content:space-between;
}

.nav{
position:fixed;
bottom:0;
left:0;
right:0;
display:flex;
background:#000;
}

.nav button{
flex:1;
background:none;
color:white;
}

</style></head><body><header>Cosmic Beats</header>
<div class="banner">Made by Gaurav Chahar</div><!-- WELCOME --><div id="welcome" class="page active"><h2>Discover Music with AI</h2>
<p>Select your favorite music styles and artists.</p><button onclick="showPage('genres')">Start</button>

</div><!-- GENRES --><div id="genres" class="page"><h3>Select Genres</h3><input id="genreSearch" placeholder="Search genre"><div id="genreList" class="grid"></div><button onclick="goArtists()">Next</button>

</div><!-- ARTISTS --><div id="artists" class="page"><h3>Select Artists</h3><input id="artistSearch" placeholder="Search artist"><div id="artistList" class="grid"></div><button onclick="finishSetup()">Finish Setup</button>

</div><!-- HOME --><div id="home" class="page"><h3>AI Daily Mix</h3>
<div id="daily"></div><h3>AI Weekly Mix</h3>
<div id="weekly"></div><h3>Trending Songs</h3>
<div id="trending"></div><button onclick="generateMix()">🎲 Surprise Mix</button>

</div><!-- SEARCH --><div id="search" class="page"><input id="searchInput" placeholder="Search songs or artists"><div id="results"></div></div><!-- PLAYER --><div class="player"><div id="nowPlaying">Nothing playing</div><div>
<button onclick="togglePlay()">Play</button>
<button onclick="nextSong()">Next</button>
</div></div><div class="nav"><button onclick="showPage('home')">Home</button>
<button onclick="showPage('search')">Search</button>

</div><audio id="audio"></audio>

<script>

const genres=[
"Bollywood","Bhojpuri","Classical","Dance","EDM","Hip Hop",
"Indie","Jazz","LoFi","Phonk","Pop","Punjabi",
"Rock","Tamil","Telugu","Trap"
]

const artists=[
"Arijit Singh","Shreya Ghoshal","Diljit Dosanjh","Sidhu Moosewala",
"AP Dhillon","Badshah","Honey Singh","Pritam",
"Neha Kakkar","Sonu Nigam","KK","Atif Aslam",
"Guru Randhawa","Darshan Raval","Karan Aujla",
"Shubh","Jubin Nautiyal","Armaan Malik"
]

let selectedGenres=[]
let selectedArtists=[]
let queue=[]
let currentIndex=0

const audio=document.getElementById("audio")

function renderGenres(){

let html=""

genres.sort().forEach(g=>{
html+=`<div class="card" onclick="toggleGenre('${g}',this)">${g}</div>`
})

document.getElementById("genreList").innerHTML=html

}

function toggleGenre(g,el){

if(selectedGenres.includes(g)){
selectedGenres=selectedGenres.filter(x=>x!==g)
el.style.background="#151528"
}else{
selectedGenres.push(g)
el.style.background="#7c3aed"
}

}

function goArtists(){

showPage("artists")
renderArtists()

}

function renderArtists(){

let html=""

artists.forEach(a=>{

let img=`https://source.unsplash.com/300x300/?${a},singer`

html+=`
<div class="card artist" onclick="toggleArtist('${a}',this)">
<img src="${img}">
${a}
</div>
`

})

document.getElementById("artistList").innerHTML=html

}

function toggleArtist(a,el){

if(selectedArtists.includes(a)){
selectedArtists=selectedArtists.filter(x=>x!==a)
el.style.background="#151528"
}else{
selectedArtists.push(a)
el.style.background="#7c3aed"
}

}

function finishSetup(){

localStorage.setItem("artists",JSON.stringify(selectedArtists))
showPage("home")
generateMix()
loadTrending()

}

async function fetchSongs(q){

let r=await fetch(`https://saavn.dev/api/search/songs?query=${q}`)
let j=await r.json()

return j.data.results

}

async function generateMix(){

let fav=JSON.parse(localStorage.getItem("artists"))||["Arijit"]

let artist=fav[Math.floor(Math.random()*fav.length)]

let songs=await fetchSongs(artist)

queue=songs.slice(0,10)

renderSongs("daily",queue.slice(0,3))
renderSongs("weekly",queue.slice(3,6))

}

async function loadTrending(){

let songs=await fetchSongs("trending")

renderSongs("trending",songs.slice(0,6))

}

function renderSongs(container,songs){

let html=""

songs.forEach((s,i)=>{

html+=`
<div class="song" onclick="playSong('${s.downloadUrl[4].url}','${s.name}',${i})">
${s.name} - ${s.primaryArtists}
</div>
`

})

document.getElementById(container).innerHTML=html

}

function playSong(url,name,i){

currentIndex=i||0
audio.src=url
audio.play()

document.getElementById("nowPlaying").innerText=name

}

function nextSong(){

currentIndex++

if(currentIndex>=queue.length)currentIndex=0

let s=queue[currentIndex]

playSong(s.downloadUrl[4].url,s.name,currentIndex)

}

function togglePlay(){

if(audio.paused)audio.play()
else audio.pause()

}

async function searchSongs(q){

if(!q)return

let songs=await fetchSongs(q)

renderSongs("results",songs.slice(0,10))

}

document.getElementById("searchInput").addEventListener("input",function(){
searchSongs(this.value)
})

function showPage(p){

document.querySelectorAll(".page").forEach(pg=>pg.classList.remove("active"))

document.getElementById(p).classList.add("active")

}

renderGenres()

</script></body>
        </html>
