<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmic Beats</title><link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Inter:wght@400;600&display=swap" rel="stylesheet"><style>

body{
margin:0;
background:#070714;
color:white;
font-family:Inter;
}

header{
font-family:Orbitron;
text-align:center;
padding:18px;
background:linear-gradient(135deg,#7c3aed,#d946ef);
}

.banner{
margin:10px;
padding:16px;
border-radius:12px;
background:linear-gradient(135deg,#9333ea,#06b6d4);
text-align:center;
}

.page{display:none;padding:14px}
.page.active{display:block}

.genreGrid,.artistGrid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.genre,.artist{
background:#1b1b30;
padding:12px;
border-radius:10px;
text-align:center;
cursor:pointer;
}

.genre.selected,.artist.selected{
background:#7c3aed;
}

.artist img{
width:100%;
border-radius:8px;
margin-bottom:5px;
}

.song{
background:#121226;
padding:10px;
margin-bottom:8px;
border-radius:8px;
cursor:pointer;
}

.song:hover{background:#1f1f3a}

input{
width:100%;
padding:10px;
border:none;
border-radius:8px;
margin-bottom:10px;
}

.player{
position:fixed;
bottom:60px;
left:0;
right:0;
background:#111125;
padding:10px;
display:flex;
justify-content:space-between;
}

.nav{
position:fixed;
bottom:0;
left:0;
right:0;
display:flex;
background:#111;
}

.nav button{
flex:1;
padding:14px;
border:none;
background:none;
color:white;
}

</style></head><body><header>Cosmic Beats</header><div class="banner">
<h2>AI Music Discovery</h2>
<p>Made by Gaurav Chahar</p>
</div><!-- GENRES --><div id="genresPage" class="page active"><h3>Select Genres</h3><input id="genreSearch" placeholder="Search genre"><div id="genres" class="genreGrid"></div><button onclick="nextArtists()">Next</button>

</div><!-- ARTISTS --><div id="artistsPage" class="page"><h3>Select Artists</h3><input id="artistSearch" placeholder="Search artist"><div id="artists" class="artistGrid"></div><button onclick="finishSetup()">Continue</button>

</div><!-- HOME --><div id="home" class="page"><h3>Daily Mix</h3>
<div id="daily"></div><h3>Weekly Mix</h3>
<div id="weekly"></div><h3>Monthly Mix</h3>
<div id="monthly"></div><button onclick="generateMix()">🎲 Surprise Mix</button>

</div><!-- SEARCH --><div id="search" class="page"><input id="searchInput" placeholder="Search songs"><div id="results"></div></div><!-- PLAYER --><div class="player"><div id="nowPlaying">Nothing Playing</div><div>
<button onclick="togglePlay()">Play</button>
<button onclick="nextSong()">Next</button>
</div></div><div class="nav"><button onclick="showPage('home')">Home</button>
<button onclick="showPage('search')">Search</button>

</div><audio id="audio"></audio>

<script>

const genresList=[
"Bollywood","Punjabi","Hip Hop","Rap","Pop","Rock","EDM","Phonk","Jazz","Classical",
"Tamil","Telugu","Bhojpuri","LoFi","Instrumental","Trap","Dance","Indie","House"
]

const artistsList=[
"Arijit Singh","Shreya Ghoshal","Diljit Dosanjh","Sidhu Moosewala","AP Dhillon",
"Badshah","Honey Singh","Pritam","Neha Kakkar","Sonu Nigam",
"KK","Atif Aslam","Rahat Fateh Ali Khan","Guru Randhawa","Darshan Raval",
"Karan Aujla","Shubh","Jubin Nautiyal","Armaan Malik","Anirudh"
]

let selectedGenres=[]
let selectedArtists=[]
let queue=[]
let currentIndex=0

const audio=document.getElementById("audio")

function renderGenres(){

let html=""

genresList.forEach(g=>{
html+=`<div class="genre" onclick="toggleGenre('${g}',this)">${g}</div>`
})

document.getElementById("genres").innerHTML=html

}

function toggleGenre(g,el){

if(selectedGenres.includes(g)){
selectedGenres=selectedGenres.filter(x=>x!==g)
el.classList.remove("selected")
}else{
selectedGenres.push(g)
el.classList.add("selected")
}

}

function nextArtists(){

showPage("artistsPage")

let html=""

artistsList.forEach(a=>{

let img=`https://source.unsplash.com/200x200/?${a},singer`

html+=`
<div class="artist" onclick="toggleArtist('${a}',this)">
<img src="${img}">
${a}
</div>
`

})

document.getElementById("artists").innerHTML=html

}

function toggleArtist(a,el){

if(selectedArtists.includes(a)){
selectedArtists=selectedArtists.filter(x=>x!==a)
el.classList.remove("selected")
}else{
selectedArtists.push(a)
el.classList.add("selected")
}

}

function finishSetup(){

localStorage.setItem("artists",JSON.stringify(selectedArtists))

showPage("home")

generateMix()

}

async function fetchSongs(q){

let res=await fetch(`https://saavn.dev/api/search/songs?query=${q}`)
let data=await res.json()

return data.data.results

}

async function generateMix(){

let fav=JSON.parse(localStorage.getItem("artists"))||["Arijit"]

let artist=fav[Math.floor(Math.random()*fav.length)]

let songs=await fetchSongs(artist)

queue=songs.slice(0,10)

renderSongs("daily",queue.slice(0,3))
renderSongs("weekly",queue.slice(3,6))
renderSongs("monthly",queue.slice(6,9))

}

function renderSongs(container,songs){

let html=""

songs.forEach((song,i)=>{

html+=`
<div class="song" onclick="playSong('${song.downloadUrl[4].url}','${song.name}',${i})">
${song.name} - ${song.primaryArtists}
</div>
`

})

document.getElementById(container).innerHTML=html

}

async function searchSongs(q){

let songs=await fetchSongs(q)

renderSongs("results",songs.slice(0,10))

}

document.getElementById("searchInput").addEventListener("input",function(){

searchSongs(this.value)

})

function playSong(url,name,i){

currentIndex=i||0

audio.src=url
audio.play()

document.getElementById("nowPlaying").innerText=name

}

function nextSong(){

currentIndex++

if(currentIndex>=queue.length)currentIndex=0

let song=queue[currentIndex]

playSong(song.downloadUrl[4].url,song.name,currentIndex)

}

function togglePlay(){

if(audio.paused)audio.play()
else audio.pause()

}

function showPage(p){

document.querySelectorAll(".page").forEach(e=>e.classList.remove("active"))

document.getElementById(p).classList.add("active")

}

renderGenres()

</script></body>
  </html>
