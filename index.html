<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmic Beats</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter',sans-serif;
background:#06060f;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

header{
padding:20px;
font-family:'Orbitron',sans-serif;
font-size:20px;
background:linear-gradient(135deg,#8b5cf6,#d946ef);
text-align:center;
}

.container{
flex:1;
overflow:auto;
padding:20px;
}

.song{
background:#161628;
border-radius:12px;
padding:12px;
margin-bottom:12px;
display:flex;
align-items:center;
gap:12px;
cursor:pointer;
}

.song img{
width:50px;
height:50px;
border-radius:8px;
object-fit:cover;
}

.song:hover{
background:#1e1e35;
}

.song-title{
font-weight:600;
}

.song-artist{
font-size:12px;
color:#aaa;
}

.player{
position:fixed;
bottom:0;
left:0;
right:0;
background:#0f0f1e;
padding:12px;
display:flex;
align-items:center;
justify-content:space-between;
border-top:1px solid rgba(255,255,255,0.1);
}

.controls button{
background:linear-gradient(135deg,#8b5cf6,#d946ef);
border:none;
color:white;
padding:10px 14px;
border-radius:20px;
cursor:pointer;
}

</style>
</head>

<body>

<header>Cosmic Beats</header>

<div class="container">

<div class="song" onclick="playSong('song1')">
<img src="https://picsum.photos/200">
<div>
<div class="song-title">Galaxy Drift</div>
<div class="song-artist">Cosmic AI</div>
</div>
</div>

<div class="song" onclick="playSong('song2')">
<img src="https://picsum.photos/201">
<div>
<div class="song-title">Nebula Nights</div>
<div class="song-artist">Cosmic AI</div>
</div>
</div>

<div class="song" onclick="playSong('song3')">
<img src="https://picsum.photos/202">
<div>
<div class="song-title">Starlight Echo</div>
<div class="song-artist">Cosmic AI</div>
</div>
</div>

</div>

<div class="player">

<div id="nowPlaying">Nothing Playing</div>

<div class="controls">
<button onclick="togglePlay()">Play / Pause</button>
</div>

</div>

<audio id="audio"></audio>

<script>

const songs={
song1:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
song2:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
song3:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"
}

const audio=document.getElementById("audio")

function playSong(song){

audio.src=songs[song]
audio.play()

document.getElementById("nowPlaying").innerText="Now Playing: "+song

}

function togglePlay(){

if(audio.paused){
audio.play()
}else{
audio.pause()
}

}

</script>

</body>
</html>
