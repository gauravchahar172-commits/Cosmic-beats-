<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmic Beats</title><link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Inter:wght@400;600&display=swap" rel="stylesheet"><style>

body{
margin:0;
background:#040410;
color:white;
font-family:Inter;
overflow-x:hidden;
}

/* cosmic stars */

body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:radial-gradient(white 1px,transparent 1px);
background-size:40px 40px;
opacity:0.08;
animation:stars 120s linear infinite;
}

@keyframes stars{
from{transform:translate(0,0)}
to{transform:translate(-500px,-500px)}
}

header{
font-family:Orbitron;
text-align:center;
padding:18px;
background:linear-gradient(135deg,#7c3aed,#d946ef);
}

.banner{
margin:15px;
padding:20px;
border-radius:15px;
background:linear-gradient(135deg,#9333ea,#06b6d4);
text-align:center;
}

.page{display:none;padding:16px}
.page.active{display:block}

.song{
background:#111827;
padding:12px;
margin-bottom:8px;
border-radius:10px;
cursor:pointer;
}

.song:hover{background:#1f2937}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.item{
background:#1a1a2e;
padding:12px;
border-radius:10px;
cursor:pointer;
text-align:center;
}

.item.selected{background:#7c3aed}

input{
width:100%;
padding:10px;
border:none;
border-radius:8px;
margin-bottom:10px;
}

.player{
position:fixed;
bottom:60px;
left:0;
right:0;
background:#0f0f1e;
padding:10px;
display:flex;
justify-content:space-between;
}

.nav{
position:fixed;
bottom:0;
left:0;
right:0;
display:flex;
background:#111;
}

.nav button{
flex:1;
padding:14px;
border:none;
background:none;
color:white;
}

</style></head><body><header>Cosmic Beats</header><div class="banner">
<h2>AI Music Discovery</h2>
<p>Made by Gaurav Chahar</p>
</div><!-- GENRE SELECTION --><div id="genresPage" class="page active"><h3>Select Genres</h3><input id="genreSearch" placeholder="Search genre"><div id="genres" class="grid"></div><button onclick="nextArtists()">Next</button>

</div><!-- ARTIST SELECTION --><div id="artistsPage" class="page"><h3>Select Artists (min 4)</h3><input id="artistSearch" placeholder="Search artist"><div id="artists" class="grid"></div><button onclick="finishSetup()">Continue</button>

</div><!-- HOME --><div id="home" class="page"><h3>AI Daily Mix</h3>
<div id="daily"></div><h3>AI Weekly Mix</h3>
<div id="weekly"></div><h3>AI Monthly Mix</h3>
<div id="monthly"></div><button onclick="generateMix()">🎲 Surprise Mix</button>

</div><!-- SEARCH --><div id="search" class="page"><input id="searchInput" placeholder="Search songs"><div id="results"></div></div><!-- PROFILE --><div id="profile" class="page"><h3>Stats</h3>
<p id="stats">Songs Played: 0</p></div><div class="player"><div id="nowPlaying">Nothing Playing</div><div>
<button onclick="togglePlay()">Play</button>
<button onclick="nextSong()">Next</button>
</div></div><div class="nav"><button onclick="showPage('home')">Home</button>
<button onclick="showPage('search')">Search</button>
<button onclick="showPage('profile')">Profile</button>

</div><audio id="audio"></audio>

<script>

let genresList=[
"Bollywood","Bhojpuri","Chill","Classical","Country","Dance","EDM","English Pop","Hip Hop","House","Indie","Instrumental","Jazz","K-Pop","Lo-Fi","Metal","Phonk","Pop","Punjabi","Rap","Rock","Tamil","Telugu","Trap","Trance"
]

let artistList=[
"Arijit Singh","Shreya Ghoshal","Diljit Dosanjh","Sidhu Moosewala","AP Dhillon","Badshah","Honey Singh","Pritam","Armaan Malik","Neha Kakkar","Atif Aslam","KK","Sonu Nigam","Rahat Fateh Ali Khan","Guru Randhawa","Darshan Raval","Shubh","Karan Aujla","Navaan Sandhu","Jass Manak","Jubin Nautiyal","Anirudh","Ilaiyaraaja","A R Rahman","Vishal Mishra"
]

let selectedGenres=[]
let selectedArtists=[]

const audio=document.getElementById("audio")

let queue=[]
let currentIndex=0
let plays=0

function renderGenres(){

let html=""

genresList.forEach(g=>{
html+=`<div class="item" onclick="toggleGenre('${g}',this)">${g}</div>`
})

document.getElementById("genres").innerHTML=html

}

function toggleGenre(g,el){

if(selectedGenres.includes(g)){
selectedGenres=selectedGenres.filter(x=>x!==g)
el.classList.remove("selected")
}else{
selectedGenres.push(g)
el.classList.add("selected")
}

}

function nextArtists(){

showPage("artistsPage")

let html=""

artistList.forEach(a=>{
html+=`<div class="item" onclick="toggleArtist('${a}',this)">${a}</div>`
})

document.getElementById("artists").innerHTML=html

}

function toggleArtist(a,el){

if(selectedArtists.includes(a)){
selectedArtists=selectedArtists.filter(x=>x!==a)
el.classList.remove("selected")
}else{
selectedArtists.push(a)
el.classList.add("selected")
}

}

function finishSetup(){

localStorage.setItem("artists",JSON.stringify(selectedArtists))

showPage("home")

generateMix()

}

async function fetchSongs(q){

let res=await fetch(`https://saavn.dev/api/search/songs?query=${q}`)

let data=await res.json()

return data.data.results

}

async function generateMix(){

let fav=JSON.parse(localStorage.getItem("artists"))||["Arijit"]

let artist=fav[Math.floor(Math.random()*fav.length)]

let songs=await fetchSongs(artist)

queue=songs.slice(0,10)

renderSongs("daily",queue.slice(0,5))
renderSongs("weekly",queue.slice(5,10))
renderSongs("monthly",queue.slice(0,5))

}

function renderSongs(container,songs){

let html=""

songs.forEach((song,i)=>{

html+=`
<div class="song" onclick="playSong('${song.downloadUrl[4].url}','${song.name}',${i})">
${song.name} - ${song.primaryArtists}
</div>
`

})

document.getElementById(container).innerHTML=html

}

async function searchSongs(q){

let songs=await fetchSongs(q)

renderSongs("results",songs.slice(0,10))

}

document.getElementById("searchInput").addEventListener("input",function(){

searchSongs(this.value)

})

function playSong(url,name,i){

currentIndex=i||0

audio.src=url
audio.play()

document.getElementById("nowPlaying").innerText=name

plays++
document.getElementById("stats").innerText="Songs Played: "+plays

}

function nextSong(){

currentIndex++

if(currentIndex>=queue.length)currentIndex=0

let song=queue[currentIndex]

playSong(song.downloadUrl[4].url,song.name,currentIndex)

}

function togglePlay(){

if(audio.paused)audio.play()
else audio.pause()

}

function showPage(p){

document.querySelectorAll(".page").forEach(e=>e.classList.remove("active"))

document.getElementById(p).classList.add("active")

}

renderGenres()

</script></body>
  </html>
